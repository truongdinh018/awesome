    <meta name="theme-color" content="#0f7668" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#070a0f" media="(prefers-color-scheme: dark)" />
    <meta name="mobile-web-app-capable" content="yes" />

    <link rel="apple-touch-icon" href="/awesome/icons/apple-touch-icon.png" />
    <title>Awesome AI</title>
    <script>
      (function () {
        try {
          var t = localStorage.getItem('awesome-ai-theme');
          if (t !== 'light' && t !== 'dark') {
            t = window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light';
          }
          document.documentElement.setAttribute('data-theme', t);
          var meta = document.querySelectorAll('meta[name="theme-color"]');
          var color = t === 'dark' ? '#070a0f' : '#0f7668';
          meta.forEach(function (m) {
            m.setAttribute('content', color);
          });
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
